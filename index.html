<style>
    :root {
        --bg-color: #0b0b0b;
        --card-bg: #ffffff;
        --text-color: #ffffff;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
    }

    header, footer {
        padding: 2% 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-transform: lowercase;
        font-size: 13px;
        letter-spacing: 0.15em;
        font-weight: 300;
    }

    .social-links {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .social-links a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        opacity: 0.6;
        transition: all 0.3s ease;
    }

    .social-links a:hover {
        opacity: 1;
        transform: translateY(-2px);
    }

    .download-container {
        position: absolute;
        top: 3%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
    }

    .download-btn {
        color: var(--text-color);
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(11, 11, 11, 0.5);
        backdrop-filter: blur(5px);
    }

    .download-btn:hover {
        background: white;
        color: black;
        border-color: white;
    }

    .slide-content {
        position: relative;
        width: 100%;
        min-height: 300px;
        background-color: var(--card-bg);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .inner-spinner {
        width: 30px;
        height: 30px;
        border: 2px solid rgba(0, 0, 0, 0.1);
        border-top: 2px solid #333;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        position: absolute;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .slide-content img {
        width: 100%;
        height: auto;
        display: block;
        opacity: 0;
        transition: opacity 0.5s ease;
        z-index: 2;
    }

    .img-loaded img { opacity: 1; }
    .img-loaded .inner-spinner { display: none; }

    .arrow-icon {
        width: 60px;
        height: 1px;
        background: white;
        position: relative;
        cursor: pointer;
        transition: opacity 0.3s;
    }
    .arrow-icon::after {
        content: '';
        position: absolute;
        right: 0;
        top: -3px;
        width: 6px;
        height: 6px;
        border-top: 1px solid white;
        border-right: 1px solid white;
        transform: rotate(45deg);
    }
    .arrow-left { transform: scaleX(-1); }

    .nav-controls {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    #page-number {
        min-width: 50px;
        text-align: center;
        font-variant-numeric: tabular-nums;
    }

    .swiper {
        width: 100%;
        flex-grow: 1;
        padding: 50px 0;
    }

    .swiper-slide {
        width: 50vw;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        opacity: 0.2;
        filter: grayscale(100%);
    }

    .swiper-slide-active {
        opacity: 1;
        filter: grayscale(0%);
        transform: scale(1.1);
    }

    @media (max-width: 768px) {
        .swiper-slide { width: 80vw; }
        .arrow-icon { width: 40px; }
        .slide-content { min-height: 150px; }
        .download-container { top: 11%; }
        .social-links { gap: 15px; }
        header, footer { padding: 5% 5%; }
    }
</style>

<body>

    <h1 class="sr-only">Manolo Raj - Designer Graphique, Web & Développeur Front-End au Québec et Canada</h1>

    <header>
        <div><img width="60px" src="logo.png" alt="Logo Manolo Raj Designer"/></div>
        <nav class="social-links" aria-label="Réseaux Sociaux">

                <span class="sr-only">Behance</span>
            </a>

                <i class="fa-brands fa-instagram"></i>
                <span class="sr-only">Instagram</span>
            </a>
            <a href="mailto:manolo.rajaonah@gmail.com" title="Email">
                <i class="fa-regular fa-envelope"></i>
                <span class="sr-only">Email</span>
            </a>
        </nav>
    </header>

    <div class="download-container">
        <a href="portfolio_medium.pdf" download class="download-btn" title="Télécharger Portfolio PDF">
            <i class="fa-solid fa-download"></i>
            <span>Version PDF</span>
        </a>
    </div>

    <main class="swiper mySwiper" aria-label="Galerie de projets">
        <div class="swiper-wrapper" id="slider-wrapper"></div>
    </main>

    <footer>
        <div id="slide-name">DESIGNER GRAPHIQUE & WEB</div>
        
        <nav class="nav-controls" aria-label="Navigation">
            <div class="arrow-icon arrow-left" id="prevBtn" role="button" aria-label="Précédent"></div>
            <div id="page-number" aria-live="polite">01 / 31</div>
            <div class="arrow-icon" id="nextBtn" role="button" aria-label="Suivant"></div>
        </nav>

        <div>&copy; 2026 Manolo Rajaonah | QC, Canada</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const wrapper = document.getElementById('slider-wrapper');
        const totalSlides = 31;

        for (let i = 1; i <= totalSlides; i++) {
            const index = i.toString().padStart(2, '0');
            const slide = `
                <div class="swiper-slide">
                    <article class="slide-content" id="container-${index}">
                        <div class="inner-spinner"></div>
                        <img 
                            src="images/7cbfec2e-${index}.png" 
                            alt="Projet Design Manolo Raj - Création ${index}" 
                            loading="lazy"
                            onload="this.parentElement.classList.add('img-loaded')">
                    </article>
            </div>`;
            wrapper.innerHTML += slide;
        }

        var swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            loop: true,
            speed: 800,
            mousewheel: true,
            keyboard: true,
            coverflowEffect: {
                rotate: 0,
                stretch: 0,
                depth: 150,
                modifier: 1,
                slideShadows: false,
            },
            on: {
                slideChange: function () {
                    const current = (this.realIndex + 1).toString().padStart(2, '0');
                    const total = totalSlides.toString().padStart(2, '0');
                    document.getElementById('page-number').innerText = `${current} / ${total}`;
                }
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => swiper.slidePrev());
        document.getElementById('nextBtn').addEventListener('click', () => swiper.slideNext());
    </script>
</body>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Atelier Coupe & Style</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>

    <main>

        <header class="hero">
            <img class="hero-img" src="images/image10.png" />
            <div class="hero-overlay"></div>
            <h1 class="title-hero">Coupe parfaite</h1>
            <a href="https://cfpalma.com/programmes/coiffure/" class="btn-offres">Voir offres</a>
        </header>

        <nav class="nav">
            <a href="index.html">Accueil</a>
            <a href="homme.html">Homme</a>
            <a href="femme.html">Femme</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>

        <h2 class="title-main">Contact</h2>

        <div class="section">
            <form class="contact-form">
                <div class="input-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" placeholder="Votre nom" required>
                </div>

                <div class="input-group">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
                </div>

                <div class="input-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
                </div>

                <div class="input-group">
                    <label for="service">Service souhaité</label>
                    <select id="service" name="service">
                        <option value="">Choisir un service</option>
                        <option>Coupe & Brushing</option>
                        <option>Coloration</option>
                        <option>Balayage</option>
                        <option>Coiffure événement</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Votre message..."></textarea>
                </div>

                <button type="submit">Envoyer le message</button>
            </form>

            <img src="images/image11.png" />
        </div>

    </main>

    <footer class="custom-footer">
        <div class="container-fluid d-flex justify-content-between align-items-center">

            <div class="copyright">
                ©Manolo-Rajaonah
            </div>

            <div class="social-icons d-flex gap-4">
                <a href="#"><i class="bi bi-tiktok"></i></a>
                <a href="#"><i class="bi bi-telephone-fill"></i></a>
                <a href="#"><i class="bi bi-facebook"></i></a>
                <a href="#"><i class="bi bi-twitter-x"></i></a>
            </div>

        </div>
    </footer>

</body>
</html>
